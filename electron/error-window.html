<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
<title>Startup error</title>
<style>
  :root { color-scheme: light dark; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #1f2128; color: #f3f4f6;
  }
  .wrap { padding: 28px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
  h1 { font-size: 18px; margin: 0 0 12px 0; color: #f87171; }
  p.lead { margin: 0 0 12px 0; font-size: 13px; color: #d1d5db; }
  pre {
    flex: 1; overflow: auto; background: #111317; border: 1px solid #2a2d36;
    border-radius: 6px; padding: 12px; font-size: 12px; white-space: pre-wrap;
    word-break: break-word; margin: 0 0 14px 0; color: #e5e7eb;
  }
  .path { font-size: 11px; color: #9ca3af; margin: 0 0 14px 0; word-break: break-all; }
  .actions { display: flex; gap: 8px; justify-content: flex-end; }
  button {
    background: #2563eb; color: white; border: 0; border-radius: 6px;
    padding: 8px 14px; font-size: 13px; cursor: pointer;
  }
  button.secondary { background: #374151; }
  button:hover { filter: brightness(1.1); }
  .copied { color: #34d399; font-size: 12px; margin-right: auto; align-self: center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Could not start the local server</h1>
  <p class="lead">Assignment Planner needs a local helper service running, and it failed to start. The detailed error is below.</p>
  <pre id="msg">(loading...)</pre>
  <p class="path">Log file: <span id="logpath">(unknown)</span></p>
  <div class="actions">
    <span id="copied" class="copied" style="display:none">Copied!</span>
    <button class="secondary" id="copyBtn">Copy log path</button>
    <button id="quitBtn">Quit</button>
  </div>
</div>
<script>
  function render() {
    const info = window.errorInfo || {}
    document.getElementById('msg').textContent = info.message || '(no message)'
    document.getElementById('logpath').textContent = info.logPath || '(unknown)'
  }
  // errorInfo is injected via executeJavaScript after load; poll briefly in case.
  if (window.errorInfo) render()
  else {
    let tries = 0
    const t = setInterval(() => {
      tries++
      if (window.errorInfo || tries > 50) { clearInterval(t); render() }
    }, 20)
  }
  document.getElementById('copyBtn').addEventListener('click', async () => {
    const p = (window.errorInfo && window.errorInfo.logPath) || ''
    try {
      await navigator.clipboard.writeText(p)
      const c = document.getElementById('copied')
      c.style.display = 'inline'
      setTimeout(() => { c.style.display = 'none' }, 1500)
    } catch (e) {
      // ignore
    }
  })
  document.getElementById('quitBtn').addEventListener('click', () => window.close())
</script>
</body>
</html>
