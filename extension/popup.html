<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Assignment Planner Sync</title>
  <style>
    body { width: 280px; padding: 14px; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #111; margin: 0 }
    h3 { margin: 0 0 8px; font-size: 14px }
    p { font-size: 12px; color: #444; margin: 6px 0 12px }
    button { width: 100%; padding: 10px; background: #0a2540; color: #fff; border: 0; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px }
    button:disabled { opacity: .5; cursor: not-allowed }
    button:not(:disabled):hover { background: #163a5e }
    .err { color: #b00020 }
    .ok { color: #0a8043 }
  </style>
</head>
<body>
  <h3>Assignment Planner Sync</h3>
  <p id="status">Detecting active tab&hellip;</p>
  <button id="sync" disabled>Sync this site</button>
  <script src="popup.js"></script>
</body>
</html>
